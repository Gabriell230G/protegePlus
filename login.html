<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protege+</title>
    <link rel="shortcut icon" href="images/Logo Protege+.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!---------------------------- HEADER ---------------------------->
    <header>
      <div class="logo">
        <img src="./images/Logo Protege+.png" alt="">
        <h2>PROTEGE+</h2>
      </div>
      <div class="btn-server">
        <a href="index.html" class="btn-login">Sair</a>
      </div>
    </header>

    <!---------------------------- HERO ---------------------------->
    <section class="hero">
      <form class="bg-login" onsubmit="login(event)">
        <h2>Acesso ao servidor</h2>

        <input type="text" id="usuario" placeholder="Usuário" />
        <input type="password" id="senha" placeholder="Senha" />

        <button type="submit">Entrar</button>
      </form>
    </section>

    <!---------------------------- FOOTER ---------------------------->
    <footer>© Protege+ todos direitos reservados</footer>
    <script src="./js/script.js"></script>
  </body>
</html>
